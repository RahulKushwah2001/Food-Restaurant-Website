<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart</title>

  <!-- ✅ Fonts and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cart.css">
</head>
<body>

  <header>
    <a href="#" class="logo"><i class="fas fa-utensils"></i>Resto.</a>
    <nav class="navbar">
        <a class="active" href="main.htm#home">Home</a>
        <a href="main.htm#dishes">Dishes</a>
        <a href="main.htm#about">About</a>
        <a href="main.htm#menu">Menu</a>
        <a href="main.htm#review">Review</a>
        <a href="main.htm#order">Order</a>
    </nav>

    <div class="icons">
        <i class="fas fa-bars" id="menu-bars"></i>
        <i class="fas fa-search" id="search-icon"></i>
        <a href="#" class="fas fa-heart"></a>
        <a href="cart.html" class="fas fa-shopping-cart">
          <span id="cart-count">0</span>
        </a>
    </div>

</header>

  <!-- ✅ Search Form -->
  <form action="" id="search-form">
    <input type="search" placeholder="Search here..." name="" id="search-box">
    <label for="search-box" class="fas fa-search"></label>
    <i class="fas fa-times" id="close"></i>
  </form>

  <!-- ✅ Cart Container -->
  <section class="cart-section" style="padding: 100px 20px 50px;">
    <div class="cart-container">
      <h1 class="heading">Your Order</h1>

      <div id="cart-items" class="cart-items"></div>

      <div class="cart-total" style="margin-top: 20px; font-size: 20px;">
        Total: ₹<span id="total-price">0</span>
      </div>

      <div class="actions" style="margin-top: 30px;">
        <button class="btn" onclick="window.location.href='main.htm'">Continue Order</button>
        <button class="btn" onclick="checkout()">Checkout</button>
      </div>
    </div>
  </section>
  <!-- <footer> ... </footer> -->
  <script src="script.js"></script>
  <script src="cart.js"></script>

</body>
</html>
